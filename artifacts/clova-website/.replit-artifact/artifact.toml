kind = "web"
previewPath = "/"
title = "Clova – Markedsføringsbyrå"
version = "1.0.0"
id = "artifacts/clova-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23916

[services.development]
run = "pnpm --filter @workspace/clova-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clova-website", "run", "build" ]
publicDir = "artifacts/clova-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23916"
BASE_PATH = "/"
